[package]
name = "uniffi-napi-bindings"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[lib]
name = "{{crate_lib_name}}_napi"
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi6", "async"] }
napi-derive = "3"
uniffi_core = { version = "0.31", default-features = false }
{{crate_dependency}}

[build-dependencies]
napi-build = "2"

[workspace]
